<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mandala - nahrávky</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }

        /* --- FOTO SBORU --- */
        #foto-sboru {
            display: block;
            width: 80%;
            max-width: 800px;
            margin: 20px auto 0;
            border-radius: 12px;
        }

        h1 {
            text-align: center;
            padding: 20px 0;
            font-size: 2em;
            color: #00708C;
        }

        /* --- VYHLEDÁVÁNÍ --- */
        #hledej {
            display: block;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 30px;
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: #16213e;
            color: #eee;
            outline: 2px solid #00708C;
        }

        #hledej:focus {
            outline: 2px solid #00b8d9;
        }

        /* --- ZÁLOŽKY --- */
        .tabbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            padding: 10px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            background: #16213e;
            color: #aaa;
            transition: all 0.2s;
        }

        .tab.aktivni {
            background: #00708C;
            color: white;
        }

        /* --- GRID --- */
        #obsah {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* --- KARTA NAHRÁVKY --- */
        .karta {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #00708C;
            transition: transform 0.2s;
        }

        .karta:hover {
            transform: translateY(-3px);
        }

        .karta h3 {
            color: #00708C;
            margin-bottom: 6px;
            font-size: 1.1em;
        }

        .karta .datum {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 8px;
        }

        .karta .popis {
            font-size: 0.9em;
            color: #bbb;
            margin-bottom: 12px;
        }

        audio {
            width: 100%;
            margin-top: 5px;
            accent-color: #00708C;
        }

        /* --- KARTA FOTKY --- */
        .karta img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .karta img:hover {
            opacity: 0.85;
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 8px;
        }

        /* --- PRÁZDNÝ STAV --- */
        #prazdno {
            text-align: center;
            color: #555;
            padding: 60px;
            grid-column: 1/-1;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<img id="foto-sboru" src="fotky/sbor.jpg" alt="Foto sboru">

<h1>🎙️ La Mandala - nahrávky</h1>

<input type="text" id="hledej" placeholder="🔍 Hledat podle názvu nebo popisu..." oninput="filtruj()">

<div class="tabbar">
    <button class="tab" onclick="prepniTab('vanocni', this)">🎄 Vánoční</button>
    <button class="tab aktivni" onclick="prepniTab('nevanocni', this)">🎵 Nevánoční</button>
    <!-- <button class="tab" onclick="prepniTab('fotky', this)">📷 Fotky</button>-->
    
</div>

<div id="obsah"></div>

<!-- Lightbox pro fotky -->
<div id="lightbox" onclick="zavriLightbox()">
    <img id="lightbox-img" src="" alt="">
</div>

<script>
// =============================================
//   ZDE PŘIDÁVEJ NAHRÁVKY A FOTKY
// =============================================

const DATA = [

    {
        typ: "vanocni",
        nazev: "Ding Dong",
        datum: "2024",
        popis: "",
        soubor: "nahravky/Ding-Dong.m4a"
    },
    {
        typ: "vanocni",
        nazev: "Hopsa pacholátka",
        datum: "",
        popis: "",
        soubor: "nahravky/hopsa-pacholatka.m4a"
    },
    {
        typ: "vanocni",
        nazev: "La lu la lej",
        datum: "2025",
        popis: "",
        soubor: "nahravky/La-lula-lej-2025.m4a"
    },
    {
        typ: "nevanocni",
        nazev: "Máky",
        datum: "2024",
        popis: "",
        soubor: "nahravky/Maky.m4a"
    },
    {
        typ: "nevanocni",
        nazev: "Nad břehym nad vodu",
        datum: "",
        popis: "",
        soubor: "nahravky/nad-brehym-nad-vodu.m4a"
    },
    {
        typ: "vanocni",
        nazev: "Otce nebeského",
        datum: "2025",
        popis: "",
        soubor: "nahravky/Otce-nebeskeho-kaple.m4a"
    },
    {
        typ: "vanocni",
        nazev: "Padla rosa",
        datum: "2025",
        popis: "",
        soubor: "nahravky/Padla-rosa.m4a"
    },
    {
        typ: "nevanocni",
        nazev: "Pavana",
        datum: "2025",
        popis: "",
        soubor: "nahravky/Pavana.m4a"
    },
    {
        typ: "nevanocni",
        nazev: "Pohoda",
        datum: "2026",
        popis: "",
        soubor: "nahravky/pohoda.m4a"
    },
    {
        typ: "nevanocni",
        nazev: "Povídajú ludé",
        datum: "2025",
        popis: "",
        soubor: "nahravky/povidaju-lude.m4a"
    },
    {
        typ: "vanocni",
        nazev: "Stojí dřevo oliva",
        datum: "2023",
        popis: "",
        soubor: "nahravky/Stoji-drevo-oliva.m4a"
    },
    {
        typ: "nevanocni",
        nazev: "Útěšený den",
        datum: "2025",
        popis: "",
        soubor: "nahravky/uteseny-den.m4a"
    },

];


// =============================================
//   LOGIKA (nemusíš měnit)
// =============================================

let aktualniTab = "nevanocni";

function filtruj() {
    const hledani = document.getElementById("hledej").value.toLowerCase();
    const obsah = document.getElementById("obsah");
    obsah.innerHTML = "";

    const filtrovana = DATA.filter(polozka => {
        const odpovida = (polozka.nazev + " " + polozka.popis)
                         .toLowerCase().includes(hledani);
        const spravnyTyp = 
            (aktualniTab === "nevanocni" && polozka.typ === "nevanocni")
            || (aktualniTab === "fotky" && polozka.typ === "fotka")
            || (aktualniTab === "vanocni" && polozka.typ === "vanocni");
        return odpovida && spravnyTyp;
    });

    if (filtrovana.length === 0) {
        obsah.innerHTML = '<div id="prazdno">😕 Nic nenalezeno</div>';
        return;
    }

    filtrovana.forEach(p => {
        const karta = document.createElement("div");
        karta.className = "karta";

        if (p.typ === "nevanocni" || p.typ === "vanocni") {
            karta.innerHTML = `
                <h3>🎙️ ${p.nazev}</h3>
                <div class="datum">📅 ${p.datum}</div>
                ${p.popis ? `<div class="popis">${p.popis}</div>` : ""}
                <audio controls>
                    <source src="${p.soubor}" type="audio/mp4">
                    Váš prohlížeč nepodporuje přehrávání.
                </audio>`;
        } else {
            karta.innerHTML = `
                <img src="${p.soubor}" alt="${p.nazev}"
                     onclick="otevriLightbox('${p.soubor}')">
                <h3>📷 ${p.nazev}</h3>
                <div class="datum">📅 ${p.datum}</div>
                ${p.popis ? `<div class="popis">${p.popis}</div>` : ""}`;
        }

        obsah.appendChild(karta);
    });
}

function prepniTab(tab, btn) {
    aktualniTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("aktivni"));
    btn.classList.add("aktivni");
    filtruj();
}

function otevriLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").style.display = "flex";
}

function zavriLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

filtruj();
</script>

</body>
</html>
